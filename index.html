<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NeoFin Wealth Tracker</title>
    
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('neofin-theme');
          const supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (theme === 'dark' || (!theme && supportDarkMode)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>

    <style>
      /* This ensures that as soon as the 'dark' class is added, the background is OLED dark */
      html.dark { background-color: #02040A !important; } 
      html { background-color: #f9fafb; transition: none !important; } 
    </style>
    
    <link rel="manifest" href="/manifest.json" />
    
    <meta name="theme-color" content="#02040A" />
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2950/2950536.png" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-[#02040A] transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
